# Simple: run all affected tests in a single job
name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: Rani367/setup-affected@v1

      - name: Run affected tests
        run: affected test --merge-base origin/main --jobs 4
