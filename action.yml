name: 'Setup affected'
description: 'Install the affected CLI for monorepo affected package detection and task execution'
branding:
  icon: 'package'
  color: 'orange'

inputs:
  version:
    description: 'Version to install (e.g., "v0.1.0" or "latest")'
    required: false
    default: 'latest'
  token:
    description: 'GitHub token for API rate limits when resolving latest version'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Determine platform target
      id: target
      shell: bash
      run: |
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)    TARGET="x86_64-unknown-linux-gnu" ;;
          Linux-ARM64)  TARGET="aarch64-unknown-linux-gnu" ;;
          macOS-X64)    TARGET="x86_64-apple-darwin" ;;
          macOS-ARM64)  TARGET="aarch64-apple-darwin" ;;
          Windows-X64)  TARGET="x86_64-pc-windows-msvc" ;;
          *)
            echo "::error::Unsupported platform: ${{ runner.os }}-${{ runner.arch }}"
            exit 1
            ;;
        esac
        echo "target=$TARGET" >> "$GITHUB_OUTPUT"

    - name: Resolve version
      id: version
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(gh api repos/Rani367/affected/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to resolve latest version. Try specifying a version explicitly."
            exit 1
          fi
        fi
        # Ensure version starts with 'v'
        if [[ "$VERSION" != v* ]]; then
          VERSION="v$VERSION"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Cache affected binary
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ runner.tool_cache }}/affected
        key: affected-${{ steps.version.outputs.version }}-${{ steps.target.outputs.target }}

    - name: Download affected binary
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TARGET="${{ steps.target.outputs.target }}"
        URL="https://github.com/Rani367/affected/releases/download/${VERSION}/affected-${TARGET}.tar.gz"

        echo "Downloading affected ${VERSION} for ${TARGET}..."
        mkdir -p "${{ runner.tool_cache }}/affected"

        curl -fsSL "$URL" -o /tmp/affected.tar.gz
        tar xzf /tmp/affected.tar.gz -C "${{ runner.tool_cache }}/affected"
        rm /tmp/affected.tar.gz

        # Make binary executable (no-op on Windows but doesn't hurt)
        chmod +x "${{ runner.tool_cache }}/affected/affected" 2>/dev/null || true

    - name: Add to PATH
      shell: bash
      run: echo "${{ runner.tool_cache }}/affected" >> "$GITHUB_PATH"

    - name: Verify installation
      shell: bash
      run: affected --version
